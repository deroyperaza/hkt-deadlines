<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperakt Deadlines</title>
<link rel="shortcut icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png">
<style>
  /* ── Hyperakt brand fonts (self-hosted) ─────────────── */
  /* Magnet Medium = display/headlines · Graphik = body/labels/data */
  @font-face{ font-family:'Magnet'; font-weight:400; font-display:swap; src:url('/fonts/Magnet-Medium.woff2') format('woff2'); }
  @font-face{ font-family:'Magnet'; font-weight:500; font-display:swap; src:url('/fonts/Magnet-Medium.woff2') format('woff2'); }
  @font-face{ font-family:'Magnet'; font-weight:600; font-display:swap; src:url('/fonts/Magnet-Medium.woff2') format('woff2'); }
  @font-face{ font-family:'Magnet'; font-weight:700; font-display:swap; src:url('/fonts/Magnet-Medium.woff2') format('woff2'); }
  @font-face{ font-family:'Graphik'; font-weight:400; font-display:swap; src:url('/fonts/Graphik-Regular-Web.woff2') format('woff2'); }
  @font-face{ font-family:'Graphik'; font-weight:500; font-display:swap; src:url('/fonts/Graphik-Medium-Web.woff2') format('woff2'); }
  @font-face{ font-family:'Graphik'; font-weight:600; font-display:swap; src:url('/fonts/Graphik-Semibold-Web.woff2') format('woff2'); }
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  /* ── LOGIN OVERLAY ───────────────────────────────── */
  #login-overlay {
    display: flex;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0f0450;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  #login-overlay svg.logo { color: #ff4d00; height: 52px; width: 52px; }
  .login-title {
    font-family: 'Magnet', 'Heebo', 'Helvetica Neue', Arial, sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fffcf1;
  }
  .login-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #ff4d00;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 12px 24px;
    font-family: 'Graphik', 'Heebo', 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .login-note {
    font-family: 'Graphik', 'Heebo', 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: rgba(255,252,241,0.4);
    letter-spacing: 0.02em;
  }
  #loading-bar {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff4d00 0%, #ffb799 100%);
    z-index: 9998;
    animation: loadpulse 1.2s ease-in-out infinite;
  }
  @keyframes loadpulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
</style>
<style>
  :root {
    --hotsauce:   #ff4d00;
    --hubble:     #0f0450;
    --horchata:   #fffcf1;
    --hype:       #ffb799;
    --hatTrick:   #b9adfb;
    --honey:      #ffd549;
    --havana:     #7cddf2;
    --hint:       #ddfc79;
    --ube:        #8b77f8;
    --border:     rgba(15,4,80,0.12);
    --border-mid: rgba(15,4,80,0.22);
    --surface:    rgba(15,4,80,0.05);
    --surface2:   rgba(15,4,80,0.09);
    --text-muted: rgba(15,4,80,0.5);
    --font-display: 'Magnet', 'Heebo', 'Helvetica Neue', Arial, sans-serif;
    --font-body:    'Graphik', 'Heebo', 'Helvetica Neue', Arial, sans-serif;
    --radius:     4px;
    --radius-lg:  8px;
    --radius-pill:100px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: light; background: #fffcf1; }
  body {
    font-family: var(--font-body);
    background: #fffcf1;
    color: #0f0450;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ──────────────────────────────── */
  .site-nav {
    background: #0f0450;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid #ff4d00;
  }
  .nav-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 0 20px;
    height: 56px;
    flex-wrap: nowrap;
  }
  .nav-left {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 1;
    min-width: 0;
    overflow: hidden;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px 0 0;
    flex-shrink: 0;
  }
  .nav-logo svg {
    height: 43px;
    width: 43px;
    display: block;
    color: #ff4d00;
    flex-shrink: 0;
  }
  .nav-separator {
    width: 1px;
    height: 28px;
    background: rgba(255,252,241,0.15);
    flex-shrink: 0;
    margin-right: 16px;
  }
  .nav-separator {
    width: 1px;
    height: 28px;
    background: rgba(255,252,241,0.15);
    flex-shrink: 0;
    margin-right: 20px;
  }
  .nav-title {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(255,252,241,0.85);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-right: 20px;
  }
  .nav-meta {
    font-family: var(--font-body);
    font-size: 12px;
    color: rgba(255,252,241,0.65);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .view-toggle {
    display: flex;
    border: 1px solid rgba(255,252,241,0.2);
    border-radius: var(--radius-pill);
  }
  .view-btn:first-child { border-radius: var(--radius-pill) 0 0 var(--radius-pill); }
  .view-btn:last-child  { border-radius: 0 var(--radius-pill) var(--radius-pill) 0; }
  .view-btn {
    background: transparent;
    border: none;
    color: rgba(255,252,241,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7px 11px;
    cursor: pointer;
    transition: all 0.15s;
    border-right: 1px solid rgba(255,252,241,0.2);
  }
  .view-btn:last-child { border-right: none; }
  .view-btn.active { background: var(--hotsauce); color: var(--horchata); }
  .view-btn:not(.active):hover { color: var(--horchata); }
  .view-btn[data-tip] { position: relative; }
  .view-btn[data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    top: calc(100% + 7px);
    bottom: auto;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15,4,80,0.92);
    color: #fffcf1;
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: var(--radius);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s 0.4s;
    z-index: 200;
  }
  .view-btn[data-tip]:hover::after { opacity: 1; }

  /* Controls row */
  .cream-bar {
    background: #fffcf1;
    border-bottom: 1px solid rgba(15,4,80,0.12);
    position: sticky;
    top: 56px;
    z-index: 99;
  }
  .cream-controls {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .cream-divider {
    height: 1px;
    background: rgba(15,4,80,0.12);
    margin: 0 20px;
  }
  .search-wrap { position: relative; flex: 0 1 220px; min-width: 140px; }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: rgba(255,252,241,0.3);
    font-size: 12px;
    pointer-events: none;
  }
  input[type="text"], select {
    background: #ffffff;
    border: 1px solid rgba(15,4,80,0.22);
    border-radius: var(--radius);
    color: #0f0450;
    font-family: var(--font-body);
    font-size: 13px;
    padding: 7px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .search-wrap input { padding-left: 32px; }
  .search-icon { color: rgba(15,4,80,0.4); }
  input[type="text"]::placeholder { color: rgba(15,4,80,0.4); }
  input[type="text"]:focus, select:focus { border-color: #ff4d00; }
  select { flex: 0 1 160px; min-width: 120px; cursor: pointer; }
  select option { background: #ffffff; color: #0f0450; }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-pill);
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    padding: 7px 16px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .clear-btn:hover { border-color: var(--hotsauce); color: var(--hotsauce); }
  .close-project-btn {
    background: transparent;
    border: 1px solid rgba(15,4,80,0.35);
    border-radius: var(--radius-pill);
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .close-project-btn::before { content: '✕'; font-size: 9px; }
  .close-project-btn:hover { border-color: #c0392b; color: #c0392b; background: rgba(192,57,43,0.06); }
  /* Archive mode — banner strip below cream bar */
  .archive-banner {
    background: rgba(15,4,80,0.06);
    border-bottom: 1px solid var(--border-mid);
    padding: 6px 20px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .archive-banner-dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; flex-shrink: 0; }
  /* Restore button inside archived project filter */
  .restore-project-btn {
    background: transparent;
    border: 1px solid rgba(15,4,80,0.35);
    border-radius: var(--radius-pill);
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .restore-project-btn:hover { border-color: #27ae60; color: #27ae60; background: rgba(39,174,96,0.06); }
  #btn-archive.active   { background: var(--hotsauce); color: var(--horchata); }
  #btn-budget.active    { background: var(--hotsauce); color: var(--horchata); }
  #btn-feedback.active  { background: var(--hotsauce); color: var(--horchata); }

  /* ── FEEDBACK VIEW ─────────────────────────────────────────────────────────── */
  #main-content.feedback-mode { padding: 32px 20px 80px; }
  .feedback-view-inner { max-width: 760px; margin: 0 auto; }
  .feedback-view-heading { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--hubble); margin-bottom: 6px; }
  .feedback-view-sub { font-size: 12px; color: var(--text-muted); margin: 0 0 24px; }
  .feedback-list { display: flex; flex-direction: column; gap: 10px; }
  .feedback-card { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; text-decoration: none; color: inherit; transition: border-color 0.15s, box-shadow 0.15s; }
  .feedback-card:hover { border-color: var(--hotsauce); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .feedback-card-abbr { display: inline-block; font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--horchata); background: var(--hubble); border-radius: 4px; padding: 2px 7px; margin-bottom: 5px; }
  .feedback-card-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--hubble); }
  .feedback-card-arrow { color: var(--border-mid); flex-shrink: 0; margin-left: 16px; transition: color 0.15s; }
  .feedback-card:hover .feedback-card-arrow { color: var(--hotsauce); }

  .nav-count {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-count .result-count { color: var(--hotsauce); font-weight: 600; }

  /* ── RESULT BAR removed — count moved into nav ── */

  /* ── SHARED BADGES ─────────────────────── */
  .led-creative { background: #c8f4ff; color: #07364a; }
  .led-strategy { background: #e5fb9e; color: #283800; }
  .led-content  { background: #fff0a0; color: #3d2b00; }
  .led-account  { background: #ffe2d0; color: #4a1a00; }
  .led-client   { background: #e8e4ff; color: #1a0857; }
  .led-pm       { background: #d0f0e0; color: #063d22; }

  .led-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 7px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
    font-family: var(--font-body);
    line-height: 1.6;
  }

  /* ── LIST VIEW ─────────────────────────── */
  #main-content.list-mode { padding: 0 20px 80px; }

  .month-section { margin-top: 32px; }
  .month-header {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.25rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--hubble);
    line-height: 1;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .month-count {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .month-count .result-count { color: var(--hotsauce); font-weight: 600; }

  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 12px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    background: #fff;
  }
  table { width: 100%; border-collapse: collapse; min-width: 560px; table-layout: fixed; }
  thead th:nth-child(1), tbody td:nth-child(1) { width: 68px; }
  thead th:nth-child(2), tbody td:nth-child(2) { width: 148px; }
  thead th:nth-child(3), tbody td:nth-child(3) { /* auto */ }
  thead th:nth-child(4), tbody td:nth-child(4) { width: 155px; }
  thead th:nth-child(5), tbody td:nth-child(5) { width: 56px; text-align: center; position: sticky; right: 0; }
  thead th:nth-child(5) { background: var(--hubble); }
  tbody td:nth-child(5) { background: #fff; }
  tbody tr:hover td:nth-child(5) { background: var(--surface); }
  thead th {
    background: var(--hubble);
    color: rgba(255,252,241,0.6);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 9px 16px;
    text-align: left;
    white-space: nowrap;
    font-family: var(--font-body);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.tr-week-end td { border-bottom: 1px solid rgba(15,4,80,0.38); }
  tbody tr.tr-week-end td:nth-child(5) { border-bottom: 1px solid rgba(15,4,80,0.38); background: #fff; }
  tbody tr:hover { background: var(--surface); }
  tbody td { padding: 10px 16px; vertical-align: top; }

  .td-date { white-space: nowrap; color: #4a5a9a; font-size: 18px; font-weight: 400; min-width: 48px; font-family: var(--font-display); line-height: 1; vertical-align: middle; border-right: 1px solid var(--border); text-align: center; }
  .td-date-inner { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .td-date-dow { font-size: 8px; font-weight: 600; letter-spacing: 0.1em; color: #4a5a9a; opacity: 0.55; font-family: var(--font-body); line-height: 1; }
  .td-project { min-width: 110px; }
  .project-tag {
    display: inline-block;
    background: var(--hubble);
    color: var(--horchata);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
    font-family: var(--font-body);
  }
  .td-milestone { color: var(--hubble); line-height: 1.5; font-size: 13px; }
  .star-flag {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--hotsauce);
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
    position: relative; top: -1px;
    flex-shrink: 0;
  }
  .note-tag { font-size: 11px; color: var(--text-muted); font-style: italic; }
  .td-led { min-width: 120px; }
  .td-led-inner { display: flex; flex-wrap: wrap; gap: 4px; align-items: flex-start; }
  .td-deadline-overdue { color: var(--hotsauce) !important; }
  .td-complete { text-align: center; vertical-align: middle !important; }
  .td-complete input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--hubble); }
  .tr-completed-show { opacity: 0.38; }
  tbody tr { transition: opacity 0.28s; }
  .cal-detail-led { display: flex; flex-wrap: wrap; gap: 4px; }

  .empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); }
  .empty-state-title {
    font-family: var(--font-display);
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--hubble);
    margin-bottom: 8px;
  }

  /* ── LOG VIEW ───────────────────────────── */
  #main-content.notes-mode { padding: 32px 20px 80px; }
  .notes-view-inner { max-width: 760px; margin: 0 auto; }
  .notes-view-heading {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.25rem);
    font-weight: 700;
    /* Log date group styles */
    letter-spacing: -0.01em;
    color: var(--hubble);
    line-height: 1;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  /* ── LOG DATE GROUPS ─────────────────────── */
  .log-date-group { margin-bottom: 32px; }
  .log-date-heading {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hotsauce);
    padding: 6px 0;
    border-bottom: 2px solid var(--hotsauce);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .log-date-heading::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--hotsauce);
    flex-shrink: 0;
  }
  .log-new-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--hotsauce);
    color: #fff;
    padding: 1px 6px;
    border-radius: 100px;
    margin-left: auto;
  }
  .log-update-item {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 12px;
    padding: 12px 14px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.55;
  }
  .log-update-item.flag-item { border-left: 3px solid var(--hotsauce); }
  .log-update-client { font-weight: 700; color: var(--hubble); padding-top: 1px; }
  .log-update-body { color: rgba(15,4,80,0.65); }
  .log-update-body strong { color: var(--hubble); font-weight: 600; }
  .standing-notes-heading {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(15,4,80,0.4);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    margin: 28px 0 10px;
  }
  @media (max-width: 580px) {
    .log-update-item { grid-template-columns: 1fr; gap: 4px; }
    .log-update-client { font-size: 12px; }
  }

  /* ── LOG CARDS (shared across views) ───── */
  .notes-list { display: grid; gap: 10px; }
  .note-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 16px;
    font-size: 13px;
    line-height: 1.6;
    padding: 14px 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .note-client { font-weight: 600; color: var(--hubble); white-space: nowrap; padding-top: 1px; }
  .note-body { color: var(--text-muted); }

  /* Log section appended at bottom of list/cal views */
  .notes-section {
    margin: 48px 0 0;
    border-top: 1px solid var(--border);
    padding-top: 28px;
  }
  .notes-eyebrow {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hotsauce);
    margin-bottom: 16px;
    display: block;
  }

  /* ── CALENDAR VIEW ─────────────────────── */
  #main-content.cal-mode { padding: 0; }
  .cal-outer { padding: 32px 36px 80px; }

  /* Nav */
  .cal-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
  .cal-nav-btn {
    background: #fff;
    border: 1px solid var(--border-mid);
    border-radius: var(--radius);
    color: var(--hubble);
    font-size: 14px;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .cal-nav-btn:hover:not(:disabled) { background: var(--hubble); color: var(--horchata); }
  .cal-nav-btn:disabled { opacity: 0.25; cursor: default; }
  .cal-month-label { display: flex; align-items: baseline; gap: 10px; flex: 1; }
  .cal-month-name {
    font-family: var(--font-display);
    font-size: clamp(1.75rem, 4vw, 2.75rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--hubble);
    line-height: 1;
  }
  .cal-month-year { font-size: 13px; color: var(--text-muted); font-family: var(--font-body); }
  .cal-month-count {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--hotsauce);
    font-family: var(--font-body);
  }

  /* Month pill strip */
  .cal-month-strip { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
  .cal-month-pill {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text-muted);
    transition: all 0.12s;
    font-family: var(--font-body);
  }
  .cal-month-pill:hover { border-color: var(--hubble); color: var(--hubble); }
  .cal-month-pill.has-data { color: var(--hubble); }
  .cal-month-pill.active { background: var(--hubble); color: var(--horchata); border-color: var(--hubble); }

  /* Grid */
  .cal-grid-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: #fff;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-day-header {
    background: var(--hubble);
    color: rgba(255,252,241,0.5);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px;
    text-align: center;
    font-family: var(--font-body);
  }
  .cal-cell {
    min-height: 115px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px 7px;
    background: #fff;
    transition: background 0.1s;
    overflow: hidden;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.empty-cell { background: var(--surface); }
  .cal-cell.has-events { cursor: pointer; }
  .cal-cell.has-events:hover { background: rgba(255,77,0,0.04); }
  .cal-cell.today-cell { background: rgba(255,77,0,0.06); }
  .cal-cell.selected-cell {
    background: rgba(255,77,0,0.1);
    box-shadow: inset 0 0 0 2px var(--hotsauce);
  }

  .cal-day-num {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    line-height: 1;
    margin-bottom: 4px;
    font-family: var(--font-body);
    font-weight: 400;
  }
  .today-bubble {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    background: var(--hotsauce);
    color: #fff;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 600;
  }

  /* Chips (desktop) */
  .cal-chip {
    display: block;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--font-body);
    padding: 2px 6px;
    border-radius: var(--radius);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.45;
    max-width: 100%;
  }
  .cal-chip.approx { opacity: 0.65; border-left: 2px dashed; padding-left: 4px; }
  .cal-chip.cal-chip-done { opacity: 0.3; text-decoration: line-through; }
  .cal-chip-star {
    display: inline-block;
    width: 4px; height: 4px;
    background: var(--hotsauce);
    border-radius: 50%;
    margin-right: 3px;
    vertical-align: middle;
    position: relative; top: -1px;
  }
  .cal-overflow {
    font-size: 11px;
    color: var(--hotsauce);
    font-weight: 600;
    padding: 1px 6px;
    letter-spacing: 0.02em;
    font-family: var(--font-body);
  }

  /* Small cal labels (mobile) — project name chips, not just dots */
  .cal-dots { display: none; flex-direction: column; gap: 2px; padding-top: 2px; }
  .cal-mini-chip {
    display: block;
    font-size: 9px;
    font-weight: 600;
    font-family: var(--font-body);
    padding: 1px 4px;
    border-radius: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.5;
    max-width: 100%;
  }
  .cal-mini-overflow {
    font-size: 9px;
    color: var(--hotsauce);
    font-weight: 600;
    padding: 0 4px;
    font-family: var(--font-body);
  }

  /* Day detail drawer */
  .cal-detail {
    margin-top: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: #fff;
    display: none;
    animation: fadeDown 0.18s ease-out;
  }
  .cal-detail.visible { display: block; }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: none; }
  }
  .cal-detail-header {
    background: var(--hubble);
    color: var(--horchata);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-body);
  }
  .cal-detail-date {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.01em;
  }
  .cal-detail-count { font-size: 11px; color: rgba(255,252,241,0.4); }
  .cal-detail-close {
    margin-left: auto;
    background: none;
    border: none;
    color: rgba(255,252,241,0.4);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: color 0.12s;
    padding: 0 2px;
  }
  .cal-detail-close:hover { color: var(--horchata); }
  .cal-detail-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    align-items: start;
    font-size: 13px;
    transition: background 0.1s;
    font-family: var(--font-body);
  }
  .cal-detail-row:last-child { border-bottom: none; }
  .cal-detail-row:hover { background: var(--surface); }
  .cal-detail-ms { line-height: 1.5; color: var(--hubble); }
  .cal-detail-note { font-size: 11px; color: var(--text-muted); font-style: italic; }
  .cal-detail-approx { font-size: 11px; color: var(--text-muted); }

  /* ── TEAM PILLS ─────────────────────────── */
  .team-pills-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    padding: 10px 20px;
    background: #fffcf1;
  }
  .team-pill {
    border: none;
    border-radius: var(--radius-pill);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.15s;
    opacity: 1;
    text-transform: none;
    line-height: 1.6;
  }
  .team-pill:hover { filter: brightness(0.93); }
  .team-pill.active { box-shadow: 0 0 0 2.5px rgba(0,0,0,0.28); }
  .team-pill.all-pill {
    background: var(--hubble);
    color: var(--horchata);
  }
  .team-pill.all-pill:hover { filter: brightness(1.2); }
  .team-pill.led-creative { background: #c8f4ff; color: #07364a; }
  .team-pill.led-strategy { background: #e5fb9e; color: #283800; }
  .team-pill.led-content  { background: #fff0a0; color: #3d2b00; }
  .team-pill.led-account  { background: #ffe2d0; color: #4a1a00; }
  .team-pill.led-client   { background: #e8e4ff; color: #1a0857; }
  .team-pill.led-pm       { background: #d0f0e0; color: #063d22; }



  /* ── MONTH NAV BAR ──────────────────────── */
  .month-nav-bar {
    background: #fffcf1;
    border-bottom: 1px solid rgba(15,4,80,0.12);
    position: sticky;
    top: 0; /* overridden by JS after layout */
    z-index: 98;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    scrollbar-width: none;
  }
  .month-nav-bar::-webkit-scrollbar { display: none; }
  .month-nav-inner {
    display: flex;
    flex: 1;
    gap: 0;
    padding: 0 20px;
    min-width: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .month-nav-inner::-webkit-scrollbar { display: none; }
  .show-all-btn {
    flex-shrink: 0;
    background: transparent;
    border: none;
    border-left: 1px solid rgba(15,4,80,0.12);
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 9px 16px;
    cursor: pointer;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .show-all-btn:hover { color: var(--hubble); }
  .show-all-btn.active { color: var(--hotsauce); }
  .month-nav-btn {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 9px 14px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    margin-bottom: -1px;
  }
  .month-nav-btn:hover { color: var(--hubble); border-color: var(--border-mid); }
  .month-nav-btn.active { color: var(--hotsauce); border-color: var(--hotsauce); }

  /* ── CALENDAR SCROLL VIEW ───────────────── */
  #main-content.cal-scroll-mode { padding: 0; }
  .cal-scroll-outer { padding: 0 20px 80px; }
  .cal-month-block { margin-top: 48px; }
  .cal-month-block:first-child { margin-top: 32px; }

  .cal-month-heading {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.25rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--hubble);
    line-height: 1;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 12px;
  }
  .cal-month-heading-count {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .cal-month-heading-count .result-count { color: var(--hotsauce); font-weight: 600; }

  @media (max-width: 700px) {
    .nav-row1 { padding: 0 16px; }
    .cream-controls { padding: 10px 16px; }
    .cream-divider { margin: 0 16px; }
    .team-pills-row { padding: 10px 16px; }
    .month-nav-inner { padding: 0 16px; }
    #main-content.list-mode { padding: 0 16px 60px; }
    .cal-scroll-outer { padding: 0 16px 60px; }
    .nav-meta { display: none; }
    thead th, tbody td { padding: 8px 12px; }
    .cal-detail-row { grid-template-columns: auto 1fr; }
    .cal-detail-row .led-badge { display: none; }
  }
  @media (max-width: 580px) {
    .cal-cell { min-height: 64px; padding: 4px; }
    .cal-chips { display: none; }
    .cal-overflow { display: none; }
    .cal-dots { display: flex; }
    .cal-day-header { font-size: 9px; padding: 6px 4px; }
    .cal-day-num { font-size: 10px; }
    .today-bubble { width: 16px; height: 16px; font-size: 9px; }
  }
  @media (max-width: 420px) {
    select { flex: 1 1 100px; min-width: 0; }
    .cal-cell { min-height: 58px; }
  }
  @media (prefers-color-scheme: dark) {
    html, body { background: #fffcf1 !important; color: #0f0450 !important; }
    .cream-bar, .team-pills-row, .month-nav-bar { background: #fffcf1 !important; }
    input[type="text"], select { background: #ffffff !important; color: #0f0450 !important; }
    .table-wrap, .note-item, .cal-detail, .cal-grid-wrap { background: #ffffff !important; }
    .cal-cell { background: #ffffff !important; }
    .cal-cell.empty-cell { background: rgba(15,4,80,0.05) !important; }
    #main-content { background: #fffcf1 !important; }
  }

  /* ── GANTT VIEW ─────────────────────────────────────────────────────────── */
  #main-content.gantt-mode {
    padding: 0;
    overflow: hidden;
  }
  .gantt-outer {
    overflow-x: auto;
    overflow-y: auto;
    overscroll-behavior: contain;
    background: var(--horchata);
  }
  .gantt-inner {
    min-width: max-content;
  }
  /* Sticky header row */
  .gantt-thead {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--hubble);
    display: flex;
    min-width: max-content;
  }
  .gantt-label-head {
    flex-shrink: 0;
    width: 140px;
    min-width: 140px;
    background: var(--hubble);
    position: sticky;
    left: 0;
    z-index: 21;
    padding: 8px 14px;
    color: rgba(255,255,255,0.4);
    font-family: var(--font-body);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: flex-end;
    border-right: 1px solid rgba(255,255,255,0.1);
    box-shadow: 2px 0 6px rgba(0,0,0,0.15);
  }
  /* Month tick marks + labels in header */
  .gantt-months {
    position: relative;
    flex-shrink: 0;
    height: 36px;
  }
  .gantt-month-tick {
    position: absolute;
    top: 0;
    bottom: 0;
    border-left: 1px solid rgba(255,255,255,0.1);
    pointer-events: none;
  }
  .gantt-month-label {
    position: absolute;
    top: 0;
    padding: 8px 6px 6px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
  }
  /* Today marker in header */
  .gantt-today-tick {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    margin-left: -1px;
    background: var(--hotsauce);
    pointer-events: none;
    z-index: 1;
  }
  .gantt-today-label-head {
    position: absolute;
    bottom: 4px;
    transform: translateX(-50%);
    font-family: var(--font-body);
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--hotsauce);
    pointer-events: none;
    white-space: nowrap;
  }
  /* Body rows */
  .gantt-body { display: flex; flex-direction: column; }
  .gantt-row {
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
    min-height: 52px;
  }
  .gantt-row:hover { background: rgba(15,4,80,0.015); }
  /* Sticky label cell */
  .gantt-label {
    flex-shrink: 0;
    width: 140px;
    min-width: 140px;
    position: sticky;
    left: 0;
    background: var(--horchata);
    z-index: 5;
    padding: 0 14px;
    display: flex;
    align-items: center;
    border-right: 1px solid var(--border);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--hubble);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    box-shadow: 2px 0 6px rgba(0,0,0,0.04);
  }
  .gantt-row:hover .gantt-label { background: #fff8ee; }
  /* Track area */
  .gantt-track {
    flex-shrink: 0;
    position: relative;
    min-height: 52px;
  }
  /* Alternating month stripe */
  .gantt-month-stripe {
    position: absolute;
    top: 0;
    bottom: 0;
    background: rgba(15,4,80,0.025);
    pointer-events: none;
  }
  /* Today bar in each row */
  .gantt-row-today {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1.5px;
    margin-left: -0.75px;
    background: var(--hotsauce);
    opacity: 0.28;
    pointer-events: none;
    z-index: 0;
  }
  /* Connector line between dots */
  .gantt-connector {
    position: absolute;
    top: 50%;
    height: 2px;
    background: #0f0450;
    transform: translateY(-50%);
    pointer-events: none;
    border-radius: 1px;
  }
  /* Milestone dots */
  .gantt-dot {
    position: absolute;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 1.5px solid rgba(15,4,80,0.18);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    z-index: 1;
  }
  .gantt-dot:hover {
    transform: translate(-50%, -50%) scale(1.7);
    box-shadow: 0 2px 8px rgba(0,0,0,0.22);
    z-index: 4;
  }
  .gantt-dot-done  { opacity: 0.2; }
  .gantt-dot-overdue { border: 2px solid var(--hotsauce) !important; }
  .gantt-dot-approx  { border-style: dashed !important; }
  /* Floating tooltip */
  .gantt-tooltip {
    position: fixed;
    background: var(--hubble);
    color: #fff;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    line-height: 1.45;
    padding: 5px 10px;
    border-radius: 4px;
    pointer-events: none;
    white-space: normal;
    max-width: 280px;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 2000;
  }
  .gantt-tooltip.visible { opacity: 1; }

  /* ── BUDGET VIEW ────────────────────────────────── */
  /* Contractor pill only appears in budget view */
  body:not(.budget-active) .team-pill.led-contractor { display: none !important; }
  .budget-mode { padding: 24px 20px 80px; max-width: 1400px; margin: 0 auto; }
  .budget-view-sub { font-size: 12px; color: var(--text-muted); margin: 8px 0 20px; }
  .budget-table-wrap { margin-top: 16px; border-radius: var(--radius-lg); border: 1px solid var(--border); background: #fff; }
  .budget-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; table-layout: auto; }
  .budget-table thead th:nth-child(5) { right: auto; }
  .budget-table tbody td:nth-child(5) { position: static; right: auto; background: transparent; }
  .budget-table tbody tr:hover td:nth-child(5) { background: transparent; }
  .budget-table thead th { position: sticky; top: 152px; z-index: 5; }
  .budget-table th { font-family: var(--font-display); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255,252,241,0.7); text-align: left; padding: 10px 12px; white-space: nowrap; background: var(--hubble); border-right: 1px solid rgba(255,252,241,0.15); }
  .budget-table th.num { text-align: right; }
  .budget-table th:last-child { border-right: none; }
  .budget-table td { padding: 14px 12px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); vertical-align: top; }
  .budget-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .budget-table td:last-child { border-right: none; }
  .budget-table th.budget-col-am, .budget-table td.budget-col-am,
  .budget-table th.budget-col-pm, .budget-table td.budget-col-pm,

// ── SORT RAW BY DATE ──────────────────────────────────────────────────────────
(function() {
  const MN = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  function sk(r) {
    const s = r.date.replace(/^~/,'').split(/[–]/)[0].trim();
    if (!s || s === 'TBD') return 99999;
    const p = s.split(' ');
    return (MN[p[0]] || 0) * 100 + (parseInt(p[1]) || 0);
  }
  RAW.sort((a, b) => sk(a) - sk(b));
})();

// Completion state helpers
function rowKey(r) { return r.project + '|' + r.date + '|' + r.milestone; }
function isCompleted(r) { return completedSet.has(rowKey(r)); }
function setCompleted(r, val) {
  const k = rowKey(r);
  if (val) completedSet.add(k); else completedSet.delete(k);
  if (r._docId && window._db) {
    window._db.collection('deadlines').doc(r._docId).update({ completed: val }).catch(console.error);
  }
}

// Parse a date string to a Date object for comparison
function parseRowDate(dateStr) {
  const s = dateStr.replace(/^~/,'').split(/[–]/)[0].trim();
  const MN = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const p = s.split(' ');
  if (p.length < 2) return null;
  const m = MN[p[0]]; const d = parseInt(p[1]);
  if (m === undefined || !d) return null;
  return new Date(2026, m, d);
}

function isPast(r) {
  const d = parseRowDate(r.date);
  if (!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today;
}

// Return Monday timestamp of the week containing dateStr (for week-break detection)
function weekStart(dateStr) {
  const d = parseRowDate(dateStr);
  if (!d) return null;
  const day = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d.getTime();
}

// Return 3-letter uppercase day of week for a date string
function dayOfWeek(dateStr) {
  const d = parseRowDate(dateStr);
  if (!d) return '';
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
}

// Extract just the numeric day from a date string (e.g. "Apr 17" → "17", "~Apr 13" → "~13", "Apr 13–24" → "13")
function dayNum(dateStr) {
  const approx = dateStr.startsWith('~');
  const match = dateStr.match(/\d+/);
  if (!match) return '–';
  return approx ? `<em>${match[0]}</em>` : match[0];
}

const LED_MAP = {
  "creative":          { cls: "led-creative", label: "CD" },
  "content strategy":  { cls: "led-content",  label: "UX Strat" },
  "strategy":          { cls: "led-strategy", label: "Strat" },
  "account management":{ cls: "led-account",  label: "AM" },
  "client":            { cls: "led-client",   label: "Client" },
  "pm":                { cls: "led-pm",       label: "PM" },
};

// Aliases: treat these project names as the canonical name
const PROJECT_ALIASES = { 'MNMF Website': 'MNMF', 'MNMF Web': 'MNMF' };
function normProject(p) { return PROJECT_ALIASES[p] || p; }

// Returns array of {cls, label} for a led string (handles combined like "Strategy + Creative")
function ledTags(led) {
  const l = led.toLowerCase();
  const out = [];
  // Split on '+', '/', 'and', '&'
  const parts = l.split(/\s*[\+\/&]\s*|\s+and\s+/);
  parts.forEach(p => {
    const trimmed = p.trim();
    const match = Object.keys(LED_MAP).find(k => trimmed.includes(k));
    if (match && !out.find(o => o.cls === LED_MAP[match].cls)) {
      out.push(LED_MAP[match]);
    }
  });
  return out.length ? out : [{ cls: "led-account", label: led }];
}

function ledClass(led) { return ledTags(led)[0].cls; } // for calendar chips/dots

function ledBadgesHtml(led) {
  return ledTags(led).map(t =>
    `<span class="led-badge ${t.cls}">${t.label}</span>`
  ).join(' ');
}

function parseEntryDate(dateStr) {
  const mm = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const clean = dateStr.replace(/^~/, '').trim();
  const first = clean.split(/[–\-]/)[0].trim();
  const m = first.match(/^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d+)/);
  if (m) return { year:2026, month:mm[m[1]], day:parseInt(m[2]) };
  return null;
}
function isApprox(s) { return s.trim().startsWith('~'); }

function getFiltered() {
  const q      = document.getElementById('search').value.toLowerCase().trim();
  const client = document.getElementById('filter-client').value;
  const led    = activeLed;
  const seen   = new Set();
  return RAW.filter(r => {
    const np = normProject(r.project);
    // Archive filter: in archive mode show only archived; otherwise hide archived
    if (showArchive ? !archivedProjects.has(np) : archivedProjects.has(np)) return false;
    // Project filter uses normalized name
    if (client && np !== client) return false;
    if (led) {
      const tags = ledTags(r.led);
      const ledKey = led.toLowerCase();
      const matchKey = Object.keys(LED_MAP).find(k => k === ledKey);
      if (!matchKey || !tags.find(t => t.cls === LED_MAP[matchKey].cls)) return false;
    }
    if (q) {
      const hay = [r.date, np, r.milestone, r.led, r.note].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    // Deduplicate: skip entries with identical normalized project + date + milestone
    const dedupKey = np + '|' + r.date + '|' + r.milestone;
    if (seen.has(dedupKey)) return false;
    seen.add(dedupKey);
    return true;
  });
}

function populateDropdowns() {

  clients.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o); });
  if (current && clients.includes(current)) cSel.value = current;
  updateCloseBtn();
}

// ── MONTH NAV BAR ─────────────────────────────────────────────────────────────
function setMonthNavTop() {
  const creamBar = document.querySelector('.cream-bar');
  const nav      = document.getElementById('month-nav-bar');
  if (!nav) return;
  // Position month nav bar to stick just below the cream bar (which itself sticks below site-nav)
  const creamBottom = creamBar ? creamBar.getBoundingClientRect().height +
    parseFloat(getComputedStyle(creamBar).top || 56) : 130;
  nav.style.top = Math.round(creamBottom) + 'px';
}

function buildMonthNav(filtered) {
  // Determine which months have data given current filters
  const hasList = {}; // month label → bool
  const hasCal  = {}; // month index → bool
  MONTH_ORDER.forEach(m => hasList[m] = false);
  CAL_MONTHS.forEach(m => hasCal[m] = false);
  filtered.forEach(r => {
    if (hasList.hasOwnProperty(r.month)) hasList[r.month] = true;
    const pd = parseEntryDate(r.date);
    if (pd && hasCal.hasOwnProperty(pd.month)) hasCal[pd.month] = true;
  });

  const inner = document.getElementById('month-nav-inner');
  inner.innerHTML = MONTH_ORDER.map(m => {
    const hasData = currentView === 'list' ? hasList[m] : hasCal[MONTH_TO_CAL[m]];
    const label   = MONTH_NAV_LABELS[m] || m;
    return `<button class="month-nav-btn${hasData ? '' : ' dimmed'}" data-month="${m}">${label}</button>`;
  }).join('');

  // Show All / Hide Completed button (list view only)
  const navBar = document.getElementById('month-nav-bar');
  let showAllBtn = document.getElementById('show-all-btn');
  if (currentView === 'list') {
    if (!showAllBtn) {
      showAllBtn = document.createElement('button');
      showAllBtn.id = 'show-all-btn';
      navBar.appendChild(showAllBtn);
      showAllBtn.addEventListener('click', () => { showAll = !showAll; renderList(); });
    }
    showAllBtn.textContent = showAll ? 'Hide Completed' : 'Show All';
    showAllBtn.className = 'show-all-btn' + (showAll ? ' active' : '');
    showAllBtn.style.display = '';
  } else if (showAllBtn) {
    showAllBtn.style.display = 'none';
  }

  // Set sticky top after DOM paint
  requestAnimationFrame(setMonthNavTop);

  // Wire click → scroll to anchor
  inner.querySelectorAll('.month-nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = 'month-anchor-' + btn.dataset.month.replace(/[^a-z]/gi,'');
      const el = document.getElementById(id);
      if (!el) return;
      // Account for all sticky headers above
      const navBar      = document.getElementById('month-nav-bar');
      const navBarBottom = navBar ? navBar.getBoundingClientRect().bottom : 0;
      const top = el.getBoundingClientRect().top + window.scrollY - navBarBottom - 12;
      window.scrollTo({ top, behavior: 'smooth' });
    });
  });
}

// Highlight the month nav button for whatever month is most visible
function setupMonthNavSpy() {
  if (window._monthNavObserver) window._monthNavObserver.disconnect();
  const anchors = document.querySelectorAll('[id^="month-anchor-"]');
  if (!anchors.length) return;

  const obs = new IntersectionObserver(entries => {
    let best = null, bestRatio = -1;
    entries.forEach(e => { if (e.intersectionRatio > bestRatio) { bestRatio = e.intersectionRatio; best = e.target; } });
    if (!best) return;
    const label = best.dataset.month;
    document.querySelectorAll('.month-nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.month === label);
    });
    // Scroll pill into view in the nav bar
    const activeBtn = document.querySelector(`.month-nav-btn[data-month="${label}"]`);
    if (activeBtn) activeBtn.scrollIntoView({ block:'nearest', inline:'nearest', behavior:'smooth' });
  }, { rootMargin: '-20% 0px -70% 0px', threshold: [0, 0.1, 0.5] });

  anchors.forEach(a => obs.observe(a));
  window._monthNavObserver = obs;
}

function renderList() {
  let filtered = getFiltered();

  // In default mode hide past items that are completed; keep them in showAll or archive mode
  if (!showAll && !showArchive) {
    filtered = filtered.filter(r => !(isPast(r) && isCompleted(r)));
  }

  updateCount(filtered.length);
  const main = document.getElementById('main-content');
  main.className = 'list-mode';
  main.style.padding = '';

  const byMonth = {};
  MONTH_ORDER.forEach(m => byMonth[m] = []);
  filtered.forEach(r => { if (byMonth[r.month]) byMonth[r.month].push(r); });

  let html = '';
  MONTH_ORDER.forEach(month => {
    const rows = byMonth[month];
    const anchorId = 'month-anchor-' + month.replace(/[^a-z]/gi,'');
    html += `<div id="${anchorId}" data-month="${month}" style="${rows.length ? '' : 'display:none'}">`;
    if (rows.length) {
      html += `<section class="month-section">
        <h2 class="month-header">${month} <span class="month-count"><span class="result-count">${rows.length}</span> item${rows.length!==1?'s':''}</span></h2>
        <div class="table-wrap"><table>
          <thead><tr><th>Date</th><th>Client</th><th>Deadline</th><th>Led by</th><th>Done</th></tr></thead>
          <tbody>${rows.map((r, i) => {
            const past    = isPast(r);
            const done    = isCompleted(r);
            const overdue = past && !done;
            const dimmed  = done && showAll;
            const key     = rowKey(r);
            const nextRow = rows[i + 1];
            const weekBreak = nextRow && weekStart(r.date) !== null && weekStart(nextRow.date) !== null && weekStart(r.date) !== weekStart(nextRow.date);
            const classes = [dimmed ? 'tr-completed-show' : '', weekBreak ? 'tr-week-end' : ''].filter(Boolean).join(' ');
            return `<tr class="${classes}" data-key="${key}">
              <td class="td-date"><div class="td-date-inner">${dayOfWeek(r.date) ? `<span class="td-date-dow">${dayOfWeek(r.date)}</span>` : ''}${dayNum(r.date)}</div></td>
              <td class="td-project"><span class="project-tag">${normProject(r.project)}</span></td>
              <td class="td-milestone${overdue ? ' td-deadline-overdue' : ''}">
                ${r.star ? '<span class="star-flag"></span>' : ''}${r.milestone}
                ${r.note ? `<br><span class="note-tag">${r.note}</span>` : ''}
              </td>
              <td class="td-led"><div class="td-led-inner">${ledBadgesHtml(r.led)}</div></td>
              <td class="td-complete"><input type="checkbox" data-key="${key}"${done ? ' checked' : ''}></td>
            </tr>`;
          }).join('')}
          </tbody>
        </table></div>
      </section>`;
    }
    html += `</div>`;
  });

  if (!filtered.length) html = `<div class="empty-state"><div class="empty-state-title">Nothing found</div><p>Try adjusting your filters or search term.</p></div>`;
  main.innerHTML = html;

  // Wire checkbox handlers
  main.querySelectorAll('input[type="checkbox"][data-key]').forEach(cb => {
    cb.addEventListener('change', function() {
      const r = RAW.find(x => rowKey(x) === this.dataset.key);
      if (!r) return;
      setCompleted(r, this.checked);
      if (!showAll && isPast(r) && this.checked) {
        // Fade out then re-render
        const tr = this.closest('tr');
        tr.style.opacity = '0';
        setTimeout(() => renderList(), 300);
      } else {
        // Just toggle dim in place
        this.closest('tr').classList.toggle('tr-completed-show', this.checked && showAll);
      }
    });
  });

  buildMonthNav(filtered);
  setupMonthNavSpy();
}

// ── CALENDAR VIEW — FULL SCROLL ────────────────────────────────────────────────
function buildAllDayMaps(filtered, year) {
  const maps = {};
  CAL_MONTHS.forEach(m => maps[m] = {});
  filtered.forEach(r => {
    const pd = parseEntryDate(r.date);
    if (pd && pd.year === year && maps[pd.month] !== undefined) {
      if (!maps[pd.month][pd.day]) maps[pd.month][pd.day] = [];
      maps[pd.month][pd.day].push(r);
    }
  });
  return maps;
}

function calGridHtml(dayMap, year, month, filtered) {
  const today    = new Date();
  const isCurMo  = today.getFullYear()===year && today.getMonth()===month;
  const todayDay = today.getDate();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMo = new Date(year, month+1, 0).getDate();
  const totalCells = Math.ceil((firstDow + daysInMo) / 7) * 7;
  const MAX_CHIPS  = 3;

  let html = '';
  for (let i = 0; i < totalCells; i++) {
    const day    = i - firstDow + 1;
    const valid  = day >= 1 && day <= daysInMo;
    const isToday = isCurMo && day === todayDay;
    const events = valid ? (dayMap[day] || []) : [];
    const hasEvt = events.length > 0;
    const isSel  = calState.selectedDay === day && calState.selectedMonth === month && valid;
    const overflow = Math.max(0, events.length - MAX_CHIPS);
    const visible  = events.slice(0, MAX_CHIPS);

    const cls = ['cal-cell',
      !valid  ? 'empty-cell'    : '',
      hasEvt  ? 'has-events'    : '',
      isToday ? 'today-cell'    : '',
      isSel   ? 'selected-cell' : '',
    ].filter(Boolean).join(' ');

    const dayNumHtml = valid
      ? `<div class="cal-day-num">${isToday ? `<span class="today-bubble">${day}</span>` : day}</div>` : '';

    const chipsHtml = visible.map(r => {
      const ac   = isApprox(r.date) ? ' approx' : '';
      const done = isCompleted(r) ? ' cal-chip-done' : '';
      return `<span class="cal-chip ${ledClass(r.led)}${ac}${done}">${r.star?'<span class="cal-chip-star"></span>':''}<b>${normProject(r.project)}</b> ${r.milestone}</span>`;
    }).join('') + (overflow ? `<div class="cal-overflow">+${overflow} more</div>` : '');

    const MAX_MINI = 4;
    const miniVisible  = events.slice(0, MAX_MINI);
    const miniOverflow = Math.max(0, events.length - MAX_MINI);
    const dotsHtml = miniVisible.map(r =>
      `<span class="cal-mini-chip ${ledClass(r.led)}${isCompleted(r) ? ' cal-chip-done' : ''}">${normProject(r.project)}</span>`
    ).join('') + (miniOverflow ? `<span class="cal-mini-overflow">+${miniOverflow}</span>` : '');

    html += `<div class="${cls}" data-day="${valid?day:''}" data-month="${month}">${dayNumHtml}<div class="cal-chips">${chipsHtml}</div><div class="cal-dots">${dotsHtml}</div></div>`;
  }
  return html;
}

function renderCal() {
  const filtered = getFiltered();
  updateCount(filtered.length);
  const main = document.getElementById('main-content');
  main.className = 'cal-scroll-mode';

  const { year, selectedDay, selectedMonth } = calState;
  const allMaps = buildAllDayMaps(filtered, year);

  // Build one block per month
  let html = '<div class="cal-scroll-outer">';

  MONTH_ORDER.forEach(label => {
    const monthIdx = MONTH_TO_CAL[label];
    const dayMap   = allMaps[monthIdx] || {};
    const total    = Object.values(dayMap).reduce((s,a)=>s+a.length,0);
    const anchorId = 'month-anchor-' + label.replace(/[^a-z]/gi,'');

    // For Oct–Dec block show Oct, Nov, Dec grids stacked
    const monthsToRender = label === 'Oct–Dec' ? [9,10,11] : [monthIdx];

    html += `<div id="${anchorId}" data-month="${label}" class="cal-month-block">`;

    if (label === 'Oct–Dec') {
      // Heading for the whole block
      const octNovDecTotal = [9,10,11].reduce((s,m) =>
        s + Object.values(allMaps[m]||{}).reduce((ss,a)=>ss+a.length,0), 0);
      html += `<h2 class="cal-month-heading">Oct–Dec <span class="cal-month-heading-count"><span class="result-count">${octNovDecTotal}</span> milestone${octNovDecTotal!==1?'s':''}</span></h2>`;
      [9,10,11].forEach(mi => {
        const dm = allMaps[mi] || {};
        const mt = Object.values(dm).reduce((s,a)=>s+a.length,0);

            <div class="cal-day-header">Sun</div><div class="cal-day-header">Mon</div>
            <div class="cal-day-header">Tue</div><div class="cal-day-header">Wed</div>
            <div class="cal-day-header">Thu</div><div class="cal-day-header">Fri</div>
            <div class="cal-day-header">Sat</div>
            ${calGridHtml(dm, year, mi, filtered)}

        </div>`;
      });
    } else {
      html += `<h2 class="cal-month-heading">${MONTH_NAMES[monthIdx]} <span class="cal-month-heading-count"><span class="result-count">${total}</span> milestone${total!==1?'s':''}</span></h2>`;
      html += `<div class="cal-grid-wrap">
        <div class="cal-grid" data-gridmonth="${monthIdx}">
          <div class="cal-day-header">Sun</div><div class="cal-day-header">Mon</div>
          <div class="cal-day-header">Tue</div><div class="cal-day-header">Wed</div>
          <div class="cal-day-header">Thu</div><div class="cal-day-header">Fri</div>
          <div class="cal-day-header">Sat</div>
          ${calGridHtml(dayMap, year, monthIdx, filtered)}
        </div>
      </div>`;
    }

    // Detail drawer (shown below whichever month's day is selected)
    if (selectedMonth === monthIdx || (label === 'Oct–Dec' && [9,10,11].includes(selectedMonth))) {
      const dm = allMaps[selectedMonth] || {};
      const detailEvents = selectedDay ? (dm[selectedDay] || []) : [];
      if (detailEvents.length) {
        const dateLabel = `${MONTH_NAMES[selectedMonth]} ${selectedDay}, ${year}`;
        html += `<div class="cal-detail visible" id="cal-detail">
          <div class="cal-detail-header">
            <span class="cal-detail-date">${dateLabel}</span>
            <span class="cal-detail-count">${detailEvents.length} milestone${detailEvents.length!==1?'s':''}</span>
            <button class="cal-detail-close" id="cal-detail-close">&#215;</button>
          </div>
          ${detailEvents.map(r=>`
            <div class="cal-detail-row">
              <span class="project-tag">${normProject(r.project)}</span>
              <div class="cal-detail-ms">
                ${r.star?'<span class="star-flag"></span>':''}${r.milestone}
                ${isApprox(r.date)?'<div class="cal-detail-approx">~ approximate date</div>':''}
                ${r.note?`<div class="cal-detail-note">${r.note}</div>`:''}
              </div>
              <div class="cal-detail-led">${ledBadgesHtml(r.led)}</div>
            </div>`).join('')}
        </div>`;
      }
    }

    html += `</div>`; // .cal-month-block
  });

  html += '</div>'; // .cal-scroll-outer
  main.innerHTML = html;

  // Click delegation on the whole content area for calendar cells
  main.addEventListener('click', e => {
    const cell = e.target.closest('.cal-cell.has-events');
    if (cell) {
      const day   = parseInt(cell.dataset.day);
      const month = parseInt(cell.dataset.month);
      if (calState.selectedDay === day && calState.selectedMonth === month) {
        calState.selectedDay = null; calState.selectedMonth = null;
      } else {
        calState.selectedDay = day; calState.selectedMonth = month;
      }
      renderCal();
      setTimeout(() => {
        const detail = document.getElementById('cal-detail');
        if (detail) detail.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }, 40);
      return;
    }
    const closeBtn = e.target.closest('#cal-detail-close');
    if (closeBtn) { calState.selectedDay = null; calState.selectedMonth = null; renderCal(); }
  }, { once: true });

  buildMonthNav(filtered);
  setupMonthNavSpy();
}

// ── NOTES VIEW ────────────────────────────────────────────────────────────────
function renderNotes() {
  const main = document.getElementById('main-content');
  main.className = 'notes-mode';
  main.style.padding = '';
  document.getElementById('month-nav-bar').style.display = 'none';

  // Format a Firestore log doc (sync or completion) into { client, body }
  function fmtLogDoc(doc) {
    if (doc.type === 'sync') {
      const who = doc.trigger === 'automatic'
        ? '🕐 Scheduled'
        : `⚡ Manual — <strong>${doc.triggeredBy || 'unknown'}</strong>`;
      const summary = doc.errors && doc.errors.length
        ? `${doc.deadlineCount} deadlines, ${doc.projectsUpdated} updated, ${doc.projectsSkipped} unchanged. ⚠️ ${doc.errors.join('; ')}`
        : `${doc.deadlineCount} deadlines — ${doc.projectsUpdated} updated, ${doc.projectsSkipped} unchanged`;
      let changesHtml = '';
      if (doc.changes && doc.changes.length > 0) {
        const icons = { added:'＋', changed:'✎', removed:'−' };
        const lines = doc.changes.map(c => {
          const icon = icons[c.type] || '·';
          const detail = c.type === 'changed'
            ? `${c.field}: <em>${c.from}</em> → <em>${c.to}</em>`
            : c.date ? `${c.date}` : '';
          return `<li><span class="change-type change-${c.type}">${icon}</span> <strong>${c.project}</strong> — ${c.milestone}${detail ? ' <span class="change-detail">('+detail+')</span>' : ''}</li>`;
        }).join('');
        changesHtml = `<ul class="change-list">${lines}</ul>`;
      }
      return { client: 'Sync', body: `${who} — ${summary}${changesHtml}` };
    }
    if (doc.type === 'completion') {
      const verb = doc.action === 'completed' ? 'marked complete' : 'unchecked';
      return { client: doc.project, body: `<strong>${doc.completedBy || 'Someone'}</strong> ${verb}: ${doc.milestone}` };
    }
    return null;
  }

  // Group docs by date — handles both legacy {date, entries} and Firestore typed docs
  function groupByDate(docs) {
    const groups = [];
    const seen = new Map();
    for (const doc of docs) {
      if (doc.date && Array.isArray(doc.entries)) {
        // Legacy hardcoded format
        const key = doc.date;
        if (!seen.has(key)) { seen.set(key, []); groups.push({ date: key, entries: seen.get(key) }); }
        seen.get(key).push(...doc.entries);
        continue;
      }
      const entry = fmtLogDoc(doc);
      if (!entry) continue;
      let dateLabel = 'Recent';
      if (doc.sortDate && doc.sortDate.toDate) {
        dateLabel = doc.sortDate.toDate().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      }
      if (!seen.has(dateLabel)) { seen.set(dateLabel, []); groups.push({ date: dateLabel, entries: seen.get(dateLabel) }); }
      seen.get(dateLabel).push(entry);
    }
    return groups;
  }

  const grouped = groupByDate(UPDATE_LOG);
  const logHtml = grouped.map((group, gi) => `
    <div class="log-date-group">
      <div class="log-date-heading">
        ${group.date}
        ${gi === 0 ? '<span class="log-new-badge">New</span>' : ''}
      </div>
      ${group.entries.map(e => `
        <div class="log-update-item">
          <span class="log-update-client">${e.client}</span>
          <span class="log-update-body">${e.body}</span>
        </div>`).join('')}
    </div>`).join('');

  main.innerHTML = `<div class="notes-view-inner">
    <h2 class="notes-view-heading">Log</h2>
    ${logHtml || '<p style="color:var(--text-muted);font-size:13px;">No log entries yet.</p>'}
  </div>`;
}

function fmtMoney(n) {
  if (n === 0) return '$0';
  if (n >= 1000) { const k = n/1000; return '$' + (k%1===0 ? k.toFixed(0) : k.toFixed(2).replace(/\.?0+$/,'')) + 'K'; }
  return '$' + n;
}
function getFilteredBudgets() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const client = document.getElementById('filter-client').value;
  return PROJECT_BUDGETS.filter(b => {
    if (archivedProjects.has(b.prefix)) return false;
    if (client && b.prefix !== client) return false;
    if (q) { const hay = [b.prefix, b.project, b.client, b.contractors.breakdown.map(c=>c.role).join(' ')].join(' ').toLowerCase(); if (!hay.includes(q)) return false; }
    return true;
  });
}

  [...PROJECT_BUDGETS].filter(b => !archivedProjects.has(b.prefix)).sort((a,b)=>a.prefix.localeCompare(b.prefix)).forEach(b => {
    const o = document.createElement('option'); o.value = b.prefix; o.textContent = b.prefix; cSel.appendChild(o);
  });
  if (current && [...cSel.options].find(o=>o.value===current)) cSel.value = current;
}

// ── GANTT VIEW ────────────────────────────────────────────────────────────────
function renderGantt() {
  const main = document.getElementById('main-content');
  main.className = 'gantt-mode';
  document.getElementById('month-nav-bar').style.display = 'none';

  // ── Config ─────────────────────────────────────────────────────────────────
  const LABEL_W    = 140;
  const PX_PER_DAY = 9;
  const START      = new Date(2026, 3,  1);   // Apr 1
  const END        = new Date(2026, 11, 31);  // Dec 31
  const TOTAL_DAYS = Math.round((END - START) / 86400000) + 1;
  const CHART_W    = TOTAL_DAYS * PX_PER_DAY;

  function xOf(d) {
    return Math.round((d - START) / 86400000) * PX_PER_DAY;
  }

  // ── Dot color via existing ledClass ────────────────────────────────────────
  const LED_BG = {
    'led-creative': '#c8f4ff',
    'led-strategy': '#e5fb9e',
    'led-content':  '#fff0a0',
    'led-account':  '#ffe2d0',
    'led-client':   '#e8e4ff',
    'led-pm':       '#d0f0e0',
  };
  function dotBg(led) { return LED_BG[ledClass(led)] || '#ddd8f0'; }

  // ── Header: month ticks + labels ───────────────────────────────────────────
  const MONTH_NAMES = ['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let monthTicksHtml = '';
  for (let i = 0; i < 9; i++) {
    const md = new Date(2026, 3 + i, 1);
    if (md > END) break;
    const x = xOf(md);
    monthTicksHtml += `<div class="gantt-month-tick" style="left:${x}px"></div>`;
    monthTicksHtml += `<div class="gantt-month-label" style="left:${x + 5}px">${MONTH_NAMES[i]}</div>`;
  }

  // ── Today ──────────────────────────────────────────────────────────────────
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const todayX = xOf(todayD);

  // ── Build project rows from filtered data ──────────────────────────────────
  const filtered = getFiltered();
  const projOrder = [];
  const projMap   = {};
  filtered.forEach(r => {
    const np = normProject(r.project);
    if (!projMap[np]) { projMap[np] = []; projOrder.push(np); }
    projMap[np].push(r);
  });
  projOrder.sort((a, b) => a.localeCompare(b));

  // ── Alternating month stripe helper ────────────────────────────────────────
  function monthStripes() {
    let s = '';
    for (let i = 0; i < 9; i++) {
      if (i % 2 === 0) continue;
      const ms = new Date(2026, 3 + i, 1);
      const me = new Date(2026, 4 + i, 1);
      if (ms > END) break;
      const x1 = xOf(ms);
      const x2 = Math.min(xOf(me), CHART_W);
      s += `<div class="gantt-month-stripe" style="left:${x1}px;width:${x2 - x1}px"></div>`;
    }
    return s;
  }

  // ── Row HTML ───────────────────────────────────────────────────────────────
  const rowsHtml = projOrder.map(proj => {
    const items = projMap[proj].filter(r => parseRowDate(r.date));
    if (!items.length) return '';
    items.sort((a, b) => parseRowDate(a.date) - parseRowDate(b.date));

    // Connector line from first to last dot
    const xs     = items.map(r => xOf(parseRowDate(r.date)));
    const minX   = Math.min(...xs);
    const maxX   = Math.max(...xs);
    const conn   = items.length > 1
      ? `<div class="gantt-connector" style="left:${minX}px;width:${maxX - minX}px"></div>`
      : '';

    // Dots
    const dots = items.map(r => {
      const x       = xOf(parseRowDate(r.date));
      const done    = isCompleted(r);
      const overdue = isPast(r) && !done;
      const approx  = r.date.startsWith('~');
      const bg      = dotBg(r.led);
      const cls     = ['gantt-dot',
        done    ? 'gantt-dot-done'    : '',
        overdue ? 'gantt-dot-overdue' : '',
        approx  ? 'gantt-dot-approx'  : '',
      ].filter(Boolean).join(' ');
      const tip = `${r.milestone} · ${r.date.replace(/^~/,'')}`;
      return `<div class="${cls}" style="left:${x}px;background:${bg}" data-tip="${tip.replace(/"/g,'&quot;')}"></div>`;
    }).join('');

    return `
      <div class="gantt-row">
        <div class="gantt-label" title="${proj}">${proj}</div>
        <div class="gantt-track" style="width:${CHART_W}px">
          ${monthStripes()}
          ${conn}
          ${dots}
          <div class="gantt-row-today" style="left:${todayX}px"></div>
        </div>
      </div>`;
  }).join('');

  // ── Render ─────────────────────────────────────────────────────────────────
  main.innerHTML = `
    <div class="gantt-outer" id="gantt-outer">
      <div class="gantt-inner">
        <div class="gantt-thead">
          <div class="gantt-label-head">Project</div>
          <div class="gantt-months" style="width:${CHART_W}px">
            ${monthTicksHtml}
            <div class="gantt-today-tick" style="left:${todayX}px">
              <div class="gantt-today-label-head" style="left:1px">Today</div>
            </div>
          </div>
        </div>
        <div class="gantt-body">${rowsHtml}</div>
      </div>
    </div>
    <div class="gantt-tooltip" id="gantt-tooltip"></div>`;

  // ── Size gantt-outer to exactly fill remaining viewport height ────────────
  const outerEl = document.getElementById('gantt-outer');
  outerEl.style.height = (window.innerHeight - outerEl.getBoundingClientRect().top) + 'px';

  // ── Tooltip wiring ─────────────────────────────────────────────────────────
  const tip = document.getElementById('gantt-tooltip');
  main.querySelectorAll('.gantt-dot').forEach(dot => {
    dot.addEventListener('mouseenter', () => {
      tip.textContent = dot.dataset.tip;
      tip.classList.add('visible');
    });
    dot.addEventListener('mousemove', e => {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 38) + 'px';
    });
    dot.addEventListener('mouseleave', () => tip.classList.remove('visible'));
  });
}

function archiveProject(name) {
  if (!name || !window._db) return;
  window._db.collection('meta').doc('archivedProjects').set(
    { projects: firebase.firestore.FieldValue.arrayUnion(name) },
    { merge: true }
  ).catch(console.error);
}

function unarchiveProject(name) {
  if (!name || !window._db) return;
  window._db.collection('meta').doc('archivedProjects').set(
    { projects: firebase.firestore.FieldValue.arrayRemove(name) },
    { merge: true }
  ).catch(console.error);
}

// ── ROUTING ───────────────────────────────────────────────────────────────────
function setActiveBtn(activeId) {
  ['btn-list','btn-cal','btn-notes','btn-gantt','btn-archive','btn-budget','btn-feedback'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('active', id === activeId);
  });
}

function showControls(show) {
  document.querySelector('.cream-bar').style.display = show ? '' : 'none';
}

// Central view-switcher — called by buttons AND hashchange.
// `view` is one of: list | cal | plan | archive | log | budget
function applyView(view) {
  if (view !== 'cal') window.scrollTo(0, 0);
  // Feedback
  if (view === 'feedback') {
    currentView = 'feedback';
    showArchive = false;
    document.body.classList.remove('budget-active');
    setActiveBtn('btn-feedback');
    showControls(false);
    document.getElementById('month-nav-bar').style.display = 'none';
    render();
    return;
  }

  // Budget
  if (view === 'budget') {
    currentView = 'budget';
    showArchive = false;
    document.body.classList.add('budget-active');
    calState.selectedDay = null; calState.selectedMonth = null;
    document.getElementById('search').value = '';
    document.getElementById('filter-client').value = '';
    activeLed = '';
    document.querySelectorAll('.team-pill').forEach(p => p.classList.remove('active'));
    const allPill = document.querySelector('.team-pill.all-pill');
    if (allPill) allPill.classList.add('active');
    setActiveBtn('btn-budget');
    showControls(true);
    document.getElementById('month-nav-bar').style.display = 'none';
    populateBudgetDropdown();
    render();
    return;
  }

  // All non-budget views exit budget mode
  document.body.classList.remove('budget-active');

  if (view === 'archive') {
    showArchive = true;
    currentView = 'list';
    document.getElementById('filter-client').value = '';
    setActiveBtn('btn-archive');
    showControls(true);
    document.getElementById('month-nav-bar').style.display = '';
    populateDropdowns();
    render();
    return;
  }

  // Standard views: list | cal | plan | log
  showArchive = false;
  document.getElementById('filter-client').value = '';

  const cfg = {
    list: { cv:'list',  btn:'btn-list',  controls:true,  monthNav:true  },
    cal:  { cv:'cal',   btn:'btn-cal',   controls:true,  monthNav:true, scrollMonth:true },
    plan: { cv:'gantt', btn:'btn-gantt', controls:true,  monthNav:false },
    log:  { cv:'notes', btn:'btn-notes', controls:false, monthNav:false },
  }[view] || { cv:'list', btn:'btn-list', controls:true, monthNav:true };

  currentView = cfg.cv;
  setActiveBtn(cfg.btn);
  showControls(cfg.controls);
  document.getElementById('month-nav-bar').style.display = cfg.monthNav ? '' : 'none';
  populateDropdowns();
  render();

  if (cfg.scrollMonth) {
    setTimeout(() => {
      const todayMonth = new Date().getMonth();
      const label = MONTH_ORDER.find(l => l === 'Oct–Dec' ? [9,10,11].includes(todayMonth) : MONTH_TO_CAL[l] === todayMonth) || MONTH_ORDER[0];
      const anchor = document.getElementById('month-anchor-' + label.replace(/[^a-z]/gi,''));
      if (anchor) anchor.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 60);
  }
}

// Nav button handlers — update URL then apply view
document.getElementById('btn-list').addEventListener('click', () => { history.pushState(null,'','#list'); applyView('list'); });
document.getElementById('btn-cal').addEventListener('click',  () => { history.pushState(null,'','#cal');  applyView('cal');  });
document.getElementById('btn-gantt').addEventListener('click',() => { history.pushState(null,'','#plan'); applyView('plan'); });
document.getElementById('btn-notes').addEventListener('click',() => { history.pushState(null,'','#log');  applyView('log');  });
document.getElementById('btn-budget').addEventListener('click',()=> { history.pushState(null,'','#budget');applyView('budget'); });
document.getElementById('btn-feedback').addEventListener('click',()=> { history.pushState(null,'','#feedback');applyView('feedback'); });
document.getElementById('btn-archive').addEventListener('click', () => {
  const next = showArchive ? 'list' : 'archive';
  history.pushState(null,'','#' + next);
  applyView(next);
});

document.getElementById('close-project-btn').addEventListener('click', () => {
  const name = document.getElementById('filter-client').value;
  if (!name) return;
  archivedProjects.add(name);       // optimistic local update
  archiveProject(name);             // async Firestore write
  document.getElementById('filter-client').value = '';
  updateCloseBtn();
  populateDropdowns();
  render();
});

document.getElementById('restore-project-btn').addEventListener('click', () => {
  const name = document.getElementById('filter-client').value;
  if (!name) return;
  archivedProjects.delete(name);    // optimistic local update
  unarchiveProject(name);           // async Firestore write
  document.getElementById('filter-client').value = '';
  updateCloseBtn();
  populateDropdowns();
  render();
});

['search','filter-client'].forEach(id => {
  document.getElementById(id).addEventListener(id==='search'?'input':'change', () => {
    calState.selectedDay = null; calState.selectedMonth = null;
    if (id === 'filter-client') updateCloseBtn();
    render();
  });
});

// Team pill filtering
document.getElementById('team-pills-row').addEventListener('click', e => {
  const pill = e.target.closest('.team-pill');
  if (!pill) return;
  activeLed = pill.dataset.led;
  document.querySelectorAll('.team-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  calState.selectedDay = null; calState.selectedMonth = null;
  render();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('search').value = '';
  document.getElementById('filter-client').value = '';
  activeLed = '';
  document.querySelectorAll('.team-pill').forEach(p => p.classList.remove('active'));
  document.querySelector('.team-pill.all-pill').classList.add('active');
  calState.selectedDay = null; calState.selectedMonth = null;
  updateCloseBtn();
  render();
});

window.addEventListener('resize', setMonthNavTop);

// Back/forward navigation via URL hash
window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1) || 'list';
  applyView(hash);
});

function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: 'hyperakt.com' });
  _auth.signInWithPopup(provider).catch(err => alert('Sign-in failed: ' + err.message));
}

function signOut() { _auth.signOut(); }

function showLoading(on) {
  document.getElementById('loading-bar').style.display = on ? 'block' : 'none';
}

let _deadlinesUnsub = null;
let _logUnsub       = null;
let _archiveUnsub   = null;
let _syncUnsub      = null;

function loadData() {
  showLoading(true);

  // Real-time deadlines listener
  if (_deadlinesUnsub) _deadlinesUnsub();
  _deadlinesUnsub = _db.collection('deadlines')
    .orderBy('dateISO')
    .onSnapshot(snapshot => {
      RAW = snapshot.docs.map(doc => ({ _docId: doc.id, ...doc.data() }));
      completedSet = new Set(RAW.filter(r => r.completed).map(r => rowKey(r)));
      populateDropdowns();
      render();
      showLoading(false);
    }, err => {
      console.error('Firestore error:', err);
      showLoading(false);
    });

  // Real-time update log listener
  if (_logUnsub) _logUnsub();
  _logUnsub = _db.collection('updateLog')
    .orderBy('sortDate', 'desc')
    .onSnapshot(snapshot => {
      const fetched = snapshot.docs.map(doc => doc.data());
      if (fetched.length > 0) UPDATE_LOG = fetched; // preserve hardcoded defaults if collection is empty
      if (currentView === 'notes') render();
    });

  // Real-time archived projects listener
  if (_archiveUnsub) _archiveUnsub();
  _archiveUnsub = _db.collection('meta').doc('archivedProjects')
    .onSnapshot(snap => {
      const data = snap.exists ? snap.data() : {};
      archivedProjects = new Set(data.projects || []);
      populateDropdowns();
      render();
    }, err => console.error('Archive listener error:', err));

  // Real-time sync metadata listener (last-updated date)
  if (_syncUnsub) _syncUnsub();
  _syncUnsub = _db.collection('meta').doc('sync')
    .onSnapshot(snap => {
      if (!snap.exists) return;
      const data = snap.data();
      const ts = data.lastSynced;
      if (ts && ts.toDate) {
        const d = ts.toDate();
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const el = document.querySelector('.nav-meta');
        if (el) el.textContent = 'Updated ' + label;
      }
    }, err => console.error('Sync listener error:', err));
}

_auth.onAuthStateChanged(user => {
  if (user && user.email && user.email.endsWith('@hyperakt.com')) {
    document.getElementById('login-overlay').style.display = 'none';
    // Apply initial view from URL hash before data loads
    applyView(location.hash.slice(1) || 'list');
    loadData();
  } else {
    if (user) _auth.signOut(); // wrong domain
    document.getElementById('login-overlay').style.display = 'flex';
    if (_deadlinesUnsub) { _deadlinesUnsub(); _deadlinesUnsub = null; }
    if (_logUnsub)       { _logUnsub();       _logUnsub = null; }
    if (_archiveUnsub)   { _archiveUnsub();   _archiveUnsub = null; }
    if (_syncUnsub)      { _syncUnsub();      _syncUnsub = null; }
  }
});
</script>
